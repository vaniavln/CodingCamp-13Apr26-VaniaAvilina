<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Expense &amp; Budget Visualizer</title>
  <link rel="stylesheet" href="css/styles.css" />
</head>
<body>
  <div class="container">
    <h1>Expense &amp; Budget Visualizer</h1>

    <!-- Balance Display -->
    <section class="balance-section">
      <h2>Total Balance</h2>
      <p id="balance-display">$0.00</p>
    </section>

    <!-- Input Form -->
    <section class="form-section">
      <h2>Add Transaction</h2>
      <form id="transaction-form" novalidate>
        <div class="form-group">
          <label for="item-name">Item Name</label>
          <input type="text" id="item-name" placeholder="e.g. Groceries" autocomplete="off" />
          <span class="error-msg" data-field="name"></span>
        </div>

        <div class="form-group">
          <label for="amount">Amount ($)</label>
          <input type="number" id="amount" placeholder="e.g. 25.00" min="0.01" step="0.01" />
          <span class="error-msg" data-field="amount"></span>
        </div>

        <div class="form-group">
          <label for="category">Category</label>
          <select id="category">
            <option value="">-- Select Category --</option>
            <option value="Food">Food</option>
            <option value="Transport">Transport</option>
            <option value="Fun">Fun</option>
          </select>
          <span class="error-msg" data-field="category"></span>
        </div>

        <button type="button" id="add-btn">Add Transaction</button>
      </form>
    </section>

    <!-- Transaction List -->
    <section class="list-section">
      <h2>Transactions</h2>
      <ul id="transaction-list">
        <li class="placeholder">No transactions added yet.</li>
      </ul>
    </section>

    <!-- Pie Chart -->
    <section class="chart-section">
      <h2>Spending by Category</h2>
      <canvas id="spending-chart" width="300" height="300" aria-label="Spending pie chart" role="img"></canvas>
    </section>
  </div>

  <script src="js/app.js"></script>
</body>
</html>
